name: Daily Digest

on:
  schedule:
    # GitHub scheduled cron is unreliable (delays + occasional skips).
    # Fire 3 times in the morning so any one success is enough.
    # Times in UTC; LA = UTC-7 (PDT) / UTC-8 (PST).
    - cron: '0 16 * * *'    # primary  — 9AM PDT / 8AM PST
    - cron: '30 17 * * *'   # backup 1 — +1.5h
    - cron: '0 19 * * *'    # backup 2 — +3h
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; never cancel an in-flight deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/prepare-digest.js | node scripts/enhance.js

      - name: Build site
        run: node scripts/build-site.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
